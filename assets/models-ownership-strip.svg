<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="60" x2="1500" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#261740"/>
      <stop offset="1" stop-color="#120C1F"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#35235A"/>
      <stop offset="1" stop-color="#221638"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="620" rx="30" fill="url(#bg)"/>

  <text x="90" y="92" fill="#EFE9FF" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Ownership Models Built for Real Sites</text>
  <text x="90" y="130" fill="#BFAFDF" font-family="Inter, Arial, sans-serif" font-size="24">Direct purchase, co-ownership, and franchise structures for growth</text>

  <g>
    <rect x="90" y="178" width="450" height="364" rx="24" fill="url(#card)" stroke="#6A4EB0"/>
    <text x="128" y="240" fill="#EADFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Direct Purchase</text>
    <rect x="132" y="272" width="120" height="190" rx="16" fill="#8A67F5"/>
    <rect x="156" y="304" width="72" height="62" rx="10" fill="#1A1230"/>
    <circle cx="192" cy="402" r="12" fill="#E5DAFF"/>
    <text x="286" y="332" fill="#D4C6FB" font-family="Inter, Arial, sans-serif" font-size="24">You own asset</text>
    <text x="286" y="372" fill="#D4C6FB" font-family="Inter, Arial, sans-serif" font-size="24">You keep margin</text>
  </g>

  <g>
    <rect x="576" y="178" width="450" height="364" rx="24" fill="url(#card)" stroke="#6A4EB0"/>
    <text x="614" y="240" fill="#EADFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Co-Ownership</text>
    <circle cx="682" cy="330" r="46" fill="#8A67F5"/>
    <circle cx="760" cy="330" r="46" fill="#6E4EEA"/>
    <rect x="640" y="390" width="160" height="56" rx="18" fill="#2B1D48"/>
    <text x="838" y="332" fill="#D4C6FB" font-family="Inter, Arial, sans-serif" font-size="24">Shared capex</text>
    <text x="838" y="372" fill="#D4C6FB" font-family="Inter, Arial, sans-serif" font-size="24">Shared revenue</text>
  </g>

  <g>
    <rect x="1062" y="178" width="450" height="364" rx="24" fill="url(#card)" stroke="#6A4EB0"/>
    <text x="1100" y="240" fill="#EADFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Franchise</text>
    <rect x="1118" y="276" width="170" height="154" rx="20" fill="#8A67F5"/>
    <rect x="1154" y="310" width="98" height="52" rx="10" fill="#1A1230"/>
    <rect x="1170" y="438" width="66" height="10" rx="5" fill="#E5DAFF"/>
    <text x="1326" y="332" fill="#D4C6FB" font-family="Inter, Arial, sans-serif" font-size="24">You provide site</text>
    <text x="1326" y="372" fill="#D4C6FB" font-family="Inter, Arial, sans-serif" font-size="24">Company operates</text>
  </g>
</svg>

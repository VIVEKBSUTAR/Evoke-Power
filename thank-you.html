<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Evoke Power</title>
  <meta name="description" content="Thank you for submitting your EV charging partnership inquiry.">
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root { --bg:#faf7f2; --card:#fff; --text:#2d3d30; --muted:#5e6e61; --forest:#0d4a2b; --amber:#f59e0b; --border:#dde8dd; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.25rem; }
    .card { max-width: 560px; width:100%; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:2rem; text-align:center; }
    h1 { margin:0 0 0.6rem; color:var(--forest); }
    p { color:var(--muted); line-height:1.7; margin:0 0 1.2rem; }
    a { display:inline-block; background:var(--amber); color:#111; text-decoration:none; font-weight:700; padding:0.75rem 1.2rem; border-radius:999px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Profile Received</h1>
    <p>Thank you for sharing your property details. Our team will review your submission and contact you shortly for feasibility assessment.</p>
    <a href="/">Return to Home</a>
  </div>
</body>
</html>

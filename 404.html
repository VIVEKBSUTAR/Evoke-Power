<body>
  <header class="nav">

  </header>
  <main class="container error-page">
    <div class="error-code">404</div>
    <h1>Lost your connection?</h1>
    <p class="max-860" style="margin-bottom: 30px;">The page you are looking for might have been moved or doesn't exist. Let's get you back to charging.</p>
